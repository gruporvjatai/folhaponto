<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Eletrônico - RV Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="tela-registro" class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center border-t-4 border-blue-600 transition-all">
        <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV Portal" class="h-16 mx-auto mb-4">
        <h1 class="text-xl font-bold mb-2 text-slate-800 uppercase">Registro de Ponto</h1>
        <p id="nome-obra" class="text-slate-500 mb-6 text-sm font-bold bg-slate-100 p-2 rounded">📍 Carregando localização da obra...</p>

        <div id="gps-status" class="mb-6 p-3 rounded-lg bg-blue-50 text-blue-800 text-sm font-bold flex items-center justify-center gap-2 border border-blue-200">
            <i data-lucide="map-pin" class="w-4 h-4 animate-bounce"></i> Validando perímetro GPS (100m)...
        </div>

        <div class="mb-6 text-left">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Digite o seu ID (Matrícula):</label>
            <input type="number" id="funcionario-id" placeholder="Ex: 105" class="w-full p-4 border-2 border-slate-200 rounded-lg shadow-sm text-center text-xl font-bold outline-none focus:border-blue-600 transition-colors">
        </div>

        <button id="btn-registrar" onclick="registrarPonto()" disabled class="w-full p-4 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-900 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg shadow-lg">
            <i data-lucide="fingerprint" class="w-6 h-6"></i> REGISTRAR PONTO AGORA
        </button>
    </div>

    <div id="tela-sucesso" class="hidden bg-emerald-600 p-8 rounded-xl shadow-2xl w-full max-w-md text-center text-white transition-all">
        <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
            <i data-lucide="check-circle" class="w-16 h-16 text-emerald-600"></i>
        </div>
        <h1 class="text-3xl font-black mb-2 uppercase">Ponto Registrado!</h1>
        <p class="text-emerald-100 mb-6 text-sm">Aguardando validação do encarregado.</p>
        
        <div class="bg-emerald-800/50 p-4 rounded-lg mb-8 backdrop-blur-sm border border-emerald-500/30">
            <p class="text-sm font-bold text-emerald-200 uppercase mb-1">Horário Oficial do Registro</p>
            <p id="hora-sucesso" class="text-4xl font-black tabular-nums tracking-wider"></p>
            <p id="data-sucesso" class="text-sm font-bold text-emerald-200 mt-1"></p>
            <p id="id-sucesso" class="text-sm font-bold text-white mt-4 pt-4 border-t border-emerald-500/30"></p>
        </div>

        <div class="animate-pulse flex flex-col items-center justify-center gap-2">
            <i data-lucide="camera" class="w-6 h-6"></i>
            <p class="font-bold uppercase text-sm">Este é o seu comprovante.<br>Tire um print desta tela agora!</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // COLOQUE SUAS CHAVES AQUI
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const obraId = urlParams.get('obraId');
        const obraLat = parseFloat(urlParams.get('lat'));
        const obraLng = parseFloat(urlParams.get('lng'));

        let userLat = null, userLng = null;

        if(!obraId || isNaN(obraLat) || isNaN(obraLng)) {
            document.getElementById('gps-status').innerHTML = "❌ QR Code inválido. Faltam parâmetros da obra.";
            document.getElementById('gps-status').className = "mb-6 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold";
        } else {
            document.getElementById('nome-obra').innerText = "📍 Obra ID: " + obraId;
            iniciarGPS();
        }

        function iniciarGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        verificarDistancia(userLat, userLng, obraLat, obraLng);
                    },
                    (error) => {
                        document.getElementById('gps-status').innerHTML = "❌ Ative a localização (GPS) do seu celular e recarregue a página.";
                        document.getElementById('gps-status').className = "mb-6 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold";
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                alert("Seu navegador não suporta GPS.");
            }
        }

        function verificarDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = R * c; // Distância em km

            // Distância aumentada para 100 metros (0.1 km)
            if (distancia > 0.1) {
                document.getElementById('gps-status').innerHTML = `❌ Você está a ${(distancia*1000).toFixed(0)}m da obra. Aproxime-se para bater o ponto (Máx: 100m).`;
                document.getElementById('gps-status').className = "mb-6 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold border border-red-200";
            } else {
                document.getElementById('gps-status').innerHTML = "✅ GPS Validado. Você está na obra!";
                document.getElementById('gps-status').className = "mb-6 p-4 rounded-lg bg-emerald-100 text-emerald-800 text-sm font-bold border border-emerald-200";
                document.getElementById('btn-registrar').disabled = false;
            }
        }

        async function registrarPonto() {
            const funcId = document.getElementById('funcionario-id').value;
            if(!funcId) return alert("Por favor, digite o seu ID!");

            document.getElementById('btn-registrar').innerHTML = '<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> REGISTRANDO...';
            document.getElementById('btn-registrar').disabled = true;

            const dataAtual = new Date();
            const horaExata = dataAtual.toLocaleTimeString('pt-BR', { hour12: false });
            const dataExata = dataAtual.toLocaleDateString('pt-BR');
            const dataIsoString = dataAtual.toISOString();

            // Salva no banco como PENDENTE
            const { error } = await supabaseClient.from('jsp_ponto_diario').insert([{
                funcionario_id: funcId,
                obra_id: obraId,
                status_ponto: 'PENDENTE', // Status pendente para o encarregado validar
                tipo: 'A DEFINIR', // Encarregado define se é Entrada ou Saída
                hora_registro: dataIsoString,
                lat_registro: userLat.toString(),
                lng_registro: userLng.toString()
            }]);

            if (error) {
                alert("Erro ao registrar: " + error.message);
                document.getElementById('btn-registrar').innerHTML = '<i data-lucide="fingerprint" class="w-6 h-6"></i> REGISTRAR PONTO AGORA';
                document.getElementById('btn-registrar').disabled = false;
            } else {
                // Preenche os dados da tela de sucesso
                document.getElementById('hora-sucesso').innerText = horaExata;
                document.getElementById('data-sucesso').innerText = dataExata;
                document.getElementById('id-sucesso').innerText = "ID FUNCIONÁRIO: " + funcId;
                
                // Esconde registro, mostra sucesso
                document.getElementById('tela-registro').classList.add('hidden');
                document.getElementById('tela-sucesso').classList.remove('hidden');
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
