<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Eletrônico - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-2 text-blue-800">Bater Ponto</h1>
        <p id="nome-obra" class="text-gray-500 mb-6 italic">Carregando dados da obra...</p>

        <div id="gps-status" class="mb-6 p-4 rounded bg-blue-100 text-blue-800 text-sm">
            Consultando localização oficial...
        </div>

        <div class="mb-4 text-left">
            <label class="block text-gray-700 font-bold mb-2">Selecione seu nome:</label>
            <select id="funcionario-select" class="w-full p-3 border rounded shadow-sm">
                <option value="">Carregando equipe...</option>
            </select>
        </div>

        <div class="flex gap-4 mb-6">
            <button id="btn-entrada" disabled class="flex-1 bg-green-500 text-white font-bold py-3 px-4 rounded opacity-50 cursor-not-allowed">
                ENTRADA
            </button>
            <button id="btn-saida" disabled class="flex-1 bg-red-500 text-white font-bold py-3 px-4 rounded opacity-50 cursor-not-allowed">
                SAÍDA
            </button>
        </div>

        <button onclick="toggleSupervisor()" class="text-xs text-gray-400 underline mt-4">Acesso Supervisor</button>
        
        <div id="area-supervisor" class="hidden mt-6 p-4 border-t border-gray-200">
            <input type="password" id="senha-supervisor" placeholder="Senha" class="w-full p-2 border rounded mb-2">
            <button onclick="liberarManual()" class="w-full bg-gray-700 text-white p-2 rounded text-sm">Liberar Sem GPS</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DO SUPABASE
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        
        // CORREÇÃO: Usando nome diferente para o cliente para evitar conflito com a lib global
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const obraId = urlParams.get('obra_id');
        
        let obraLatOficial = null;
        let obraLngOficial = null;
        let userLat = null;
        let userLng = null;

        if (!obraId) {
            document.getElementById('gps-status').innerText = "❌ Erro: ID da obra não encontrado no QR Code.";
            document.getElementById('gps-status').className = "mb-6 p-4 rounded bg-red-100 text-red-800 text-sm";
        } else {
            inicializarSistema();
        }

        async function inicializarSistema() {
            try {
                // 1. Busca a localização da obra no Supabase
                const { data: obra, error: errorObra } = await supabaseClient
                    .from('jsp_obras')
                    .select('nome, lat, lng')
                    .eq('id', obraId)
                    .single();

                if (errorObra || !obra) throw new Error("Obra não cadastrada no banco.");

                document.getElementById('nome-obra').innerText = obra.nome;
                obraLatOficial = parseFloat(obra.lat);
                obraLngOficial = parseFloat(obra.lng);

                // 2. Carrega os funcionários
                carregarEquipe();

                // 3. Pega o GPS do celular e compara
                pegarLocalizacaoUsuario();

            } catch (err) {
                document.getElementById('gps-status').innerText = "❌ " + err.message;
                document.getElementById('gps-status').className = "mb-6 p-4 rounded bg-red-100 text-red-800 text-sm";
            }
        }

        async function carregarEquipe() {
            const { data, error } = await supabaseClient.from('jsp_equipe').select('id, nome');
            const select = document.getElementById('funcionario-select');
            select.innerHTML = '<option value="">Selecione seu nome...</option>';
            if (data) {
                data.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.id;
                    opt.text = f.nome;
                    select.appendChild(opt);
                });
            }
        }

        function pegarLocalizacaoUsuario() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    validarDistancia();
                }, (err) => {
                    document.getElementById('gps-status').innerText = "❌ GPS Desativado. Ative para bater o ponto.";
                    document.getElementById('gps-status').className = "mb-6 p-4 rounded bg-red-100 text-red-800 text-sm";
                }, { enableHighAccuracy: true });
            }
        }

        function validarDistancia() {
            const R = 6371e3; // Raio da Terra em metros
            const φ1 = userLat * Math.PI/180;
            const φ2 = obraLatOficial * Math.PI/180;
            const Δφ = (obraLatOficial-userLat) * Math.PI/180;
            const Δλ = (obraLngOficial-userLng) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = R * c;

            const statusDiv = document.getElementById('gps-status');
            if (distancia <= 50) {
                statusDiv.innerHTML = `✅ Localização Confirmada! (${Math.round(distancia)}m)`;
                statusDiv.className = "mb-6 p-4 rounded bg-green-100 text-green-800 text-sm";
                document.getElementById('btn-entrada').disabled = false;
                document.getElementById('btn-entrada').classList.remove('opacity-50');
                document.getElementById('btn-saida').disabled = false;
                document.getElementById('btn-saida').classList.remove('opacity-50');
            } else {
                statusDiv.innerHTML = `❌ Você está fora da obra. (${Math.round(distancia)}m de distância).`;
                statusDiv.className = "mb-6 p-4 rounded bg-red-100 text-red-800 text-sm";
            }
        }

        async function registrarPonto(tipo) {
            const funcId = document.getElementById('funcionario-select').value;
            if(!funcId) return alert("Selecione seu nome!");

            const { error } = await supabaseClient.from('jsp_ponto_diario').insert([{
                funcionario_id: funcId,
                obra_id: obraId,
                tipo: tipo,
                lat_registro: userLat.toString(),
                lng_registro: userLng.toString()
            }]);

            if (error) alert("Erro: " + error.message);
            else alert("Ponto de " + tipo + " registrado!");
        }

        document.getElementById('btn-entrada').onclick = () => registrarPonto('ENTRADA');
        document.getElementById('btn-saida').onclick = () => registrarPonto('SAIDA');

        function toggleSupervisor() { document.getElementById('area-supervisor').classList.toggle('hidden'); }
        
        function liberarManual() {
            if(document.getElementById('senha-supervisor').value === '123456') {
                document.getElementById('btn-entrada').disabled = false;
                document.getElementById('btn-entrada').classList.remove('opacity-50');
                document.getElementById('btn-saida').disabled = false;
                document.getElementById('btn-saida').classList.remove('opacity-50');
                document.getElementById('gps-status').innerText = "🔓 Liberado manualmente pelo supervisor.";
            }
        }
    </script>
</body>
</html>
