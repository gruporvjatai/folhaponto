<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Encarregado - RV Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RV Sistema de Ponto">
    <meta name="apple-mobile-web-app-title" content="RV Sistema de Ponto">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="manifest" href="manifest.json">
    
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-white p-5 md:p-6 rounded-2xl shadow-xl border border-slate-200 transition-all">
        
        <!-- Cabeçalho -->
        <div class="flex justify-between items-center mb-5 pb-4 border-b border-slate-200">
            <div class="flex items-center gap-2">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="shield-check" class="text-blue-600 w-5 h-5"></i> Painel do Encarregado
                </h2>
                <button id="btn-trocar-obra" onclick="voltarSelecaoObra()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-500 p-2 rounded-lg transition border border-slate-200" title="Trocar Obra">
                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="sair()" class="p-2 text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 rounded-lg transition" title="Sair / Voltar">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
                <img src="https://i.postimg.cc/PqdgXGF0/logo-rv-negociospng.png" alt="RV" class="h-8">
            </div>
        </div>

        <!-- Tela de Seleção de Obra -->
        <div id="selecao-obra" class="text-center py-6">
            <i data-lucide="building" class="w-12 h-12 mx-auto text-slate-300 mb-3"></i>
            <p class="text-sm font-bold text-slate-600 mb-2 uppercase tracking-wider">Escolha a Obra</p>
            <select id="select-obra" class="w-full p-4 border-2 border-slate-200 rounded-xl mb-4 text-center font-bold outline-none bg-slate-50 text-lg focus:border-indigo-400 transition"></select>
            <button onclick="acessarObra()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 hover:bg-indigo-700 transition-colors">
                <i data-lucide="arrow-right-circle" class="w-5 h-5"></i> Gerenciar Obra
            </button>
            <button onclick="definirLocalObra()" class="mt-6 text-xs font-bold text-slate-400 hover:text-slate-600 uppercase tracking-wider transition flex items-center justify-center gap-1 mx-auto">
                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Definir Localização Atual como Sede
            </button>
        </div>

        <!-- Painel Principal (após escolher obra) -->
        <div id="painel-supervisor" class="hidden">
            
            <!-- Info da Obra -->
            <div class="bg-gradient-to-r from-indigo-50 to-blue-50 border border-indigo-100 p-4 rounded-xl mb-6 text-center">
                <h3 id="nome-obra-titulo" class="font-black text-indigo-800 text-lg mb-1">OBRA...</h3>
                <p class="text-sm text-indigo-600 font-medium flex items-center justify-center gap-1">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i> Gerenciamento de registros
                </p>
            </div>

            <!-- SEÇÃO 1: PENDENTES E CONFIRMADOS -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-sm font-black text-slate-700 uppercase tracking-wider flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 h-4 text-amber-500"></i> Pendentes de Confirmação
                    </h4>
                    <button onclick="carregarPendentes()" class="text-blue-600 hover:text-blue-800 flex items-center gap-1 text-xs font-bold bg-blue-50 px-3 py-1.5 rounded-lg transition">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Atualizar
                    </button>
                </div>
                <div id="lista-pendentes" class="space-y-3 max-h-80 overflow-y-auto pr-1 mb-4">
                    <!-- Lista dinâmica -->
                </div>
                
                <button onclick="abrirModalConfirmados()" class="w-full p-3 bg-white border-2 border-dashed border-slate-300 text-slate-600 rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition">
                    <i data-lucide="list-checks" class="w-5 h-5"></i> Visualizar Registros Confirmados Hoje
                </button>
            </div>

            <!-- SEÇÃO 2: LANÇAMENTOS RÁPIDOS (Cards lado a lado) -->
            <div class="mb-8">
                <h4 class="text-sm font-black text-slate-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4 text-emerald-500"></i> Lançamentos
                </h4>
                <div class="grid grid-cols-2 gap-3">
                    <!-- Card Ponto Manual -->
                    <button onclick="abrirModalManual()" class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md hover:border-blue-300 transition group">
                        <div class="bg-blue-100 w-10 h-10 rounded-lg flex items-center justify-center mb-2 group-hover:bg-blue-200 transition">
                            <i data-lucide="edit" class="w-5 h-5 text-blue-700"></i>
                        </div>
                        <h5 class="font-bold text-slate-800 text-sm">Ponto Manual</h5>
                        <p class="text-[10px] text-slate-500 mt-1">Registrar entrada para funcionário</p>
                    </button>
                    <!-- Card Metragem -->
                    <button onclick="abrirModalMetragem()" class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md hover:border-amber-300 transition group">
                        <div class="bg-amber-100 w-10 h-10 rounded-lg flex items-center justify-center mb-2 group-hover:bg-amber-200 transition">
                            <i data-lucide="ruler" class="w-5 h-5 text-amber-700"></i>
                        </div>
                        <h5 class="font-bold text-slate-800 text-sm">Metragem</h5>
                        <p class="text-[10px] text-slate-500 mt-1">Lançar produção de terceirizado</p>
                    </button>
                </div>
            </div>

            <!-- SEÇÃO 3: RELATÓRIOS -->
            <div>
                <h4 class="text-sm font-black text-slate-700 uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="share-2" class="w-4 h-4 text-purple-500"></i> Relatórios
                </h4>
                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="btn-whatsapp" onclick="compartilharRelatorioWhatsApp()" class="flex-1 p-3 bg-green-600 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-green-700 transition shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                        </svg>
                        WhatsApp
                    </button>
                    <button id="btn-share-externo" onclick="compartilharRelatorioExterno()" class="flex-1 p-3 bg-indigo-600 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 transition shadow-sm">
                        <i data-lucide="share-2" class="w-5 h-5"></i> Compart. Externo
                    </button>
                </div>
                <p class="text-[10px] text-slate-400 text-center mt-3">O relatório inclui apenas entradas do dia</p>
            </div>
        </div>
    </div>

    <!-- Modal Manual -->
    <div id="modal-manual" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm">
            <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center gap-2"><i data-lucide="clock" class="text-blue-600"></i> Ponto Manual</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Funcionário</label>
                    <select id="manual-funcionario" class="w-full p-3 border border-slate-200 rounded-xl outline-none bg-slate-50 font-bold text-slate-700"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Hora Exata</label>
                    <input type="time" id="manual-hora" class="w-full p-3 border border-slate-200 rounded-xl outline-none font-bold text-slate-700 text-center">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tipo de Movimento</label>
                    <select id="manual-tipo" class="w-full p-3 border border-slate-200 rounded-xl outline-none font-bold text-slate-700">
                        <option value="ENTRADA">Entrada</option>
                    </select>
                </div>
                <div class="pt-2">
                    <button onclick="salvarPontoManual(event)" class="w-full p-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 mb-2 transition-colors">Salvar Definitivo</button>
                    <button onclick="fecharModalManual()" class="w-full p-3 bg-slate-200 hover:bg-slate-300 transition-colors text-slate-700 rounded-xl font-bold">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmados -->
    <div id="modal-confirmados" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg text-slate-800"><i data-lucide="check-circle" class="inline text-green-600 mr-2"></i>Confirmados Hoje</h3>
                <button onclick="fecharModalConfirmados()" class="p-1 hover:bg-slate-100 rounded"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="modal-confirmados-conteudo" class="space-y-2">
                <p class="text-center text-slate-500">Carregando...</p>
            </div>
        </div>
    </div>

    <!-- Modal Lançar Metragem -->
    <div id="modal-metragem" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm">
            <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center gap-2"><i data-lucide="ruler" class="text-amber-600"></i> Lançar Metragem</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Terceirizado</label>
                    <select id="metragem-terceirizado" class="w-full p-3 border border-slate-200 rounded-xl outline-none bg-slate-50 font-bold text-slate-700"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>
                    <input type="date" id="metragem-data" class="w-full p-3 border border-slate-200 rounded-xl outline-none font-bold text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Metros (m² / m linear)</label>
                    <input type="number" step="0.01" id="metragem-metros" placeholder="Ex: 15.5" class="w-full p-3 border border-slate-200 rounded-xl outline-none font-bold text-slate-700">
                </div>
                <div class="pt-2">
                    <button onclick="salvarMetragem(event)" class="w-full p-3 bg-amber-600 text-white rounded-xl font-bold hover:bg-amber-700 mb-2 transition-colors">Salvar Metragem</button>
                    <button onclick="fecharModalMetragem()" class="w-full p-3 bg-slate-200 hover:bg-slate-300 transition-colors text-slate-700 rounded-xl font-bold">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== SCRIPT MANTIDO EXATAMENTE IGUAL, SEM ALTERAÇÕES DE FUNCIONALIDADE ==========
        lucide.createIcons();
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let obraAtualId = null;
        let equipeGlobal = [];
        let terceirizadosGlobal = [];

        window.onload = () => {
            carregarObras();
        };

        function sair() {
            localStorage.removeItem('obra_atual_id');
            window.location.href = 'index.html';
        }

        async function carregarObras() {
            const { data } = await supabaseClient.from('jsp_obras').select('id, nome').order('nome');
            const sel = document.getElementById('select-obra');
            sel.innerHTML = '<option value="">-- Selecione --</option>';
            if(data) data.forEach(o => sel.innerHTML += `<option value="${o.id}">${o.nome}</option>`);
        }

        async function acessarObra() {
            const sel = document.getElementById('select-obra');
            if(!sel.value) return alert("Selecione a obra!");
            obraAtualId = sel.value;
            localStorage.setItem('obra_atual_id', obraAtualId);
            document.getElementById('nome-obra-titulo').innerText = sel.options[sel.selectedIndex].text;
            document.getElementById('selecao-obra').classList.add('hidden');
            document.getElementById('painel-supervisor').classList.remove('hidden');
            document.getElementById('btn-trocar-obra').classList.remove('hidden');
            await carregarEquipePorObra();
            await carregarTerceirizadosPorObra();
            carregarPendentes();
        }

        async function carregarEquipePorObra() {
            const selectManual = document.getElementById('manual-funcionario');
            selectManual.innerHTML = '<option value="">Carregando...</option>';
            const { data, error } = await supabaseClient.from('jsp_equipe').select('id, nome, matricula').eq('obra_atual_id', obraAtualId).eq('ativo', true).order('nome');
            if (error) { console.error(error); selectManual.innerHTML = '<option value="">Erro ao carregar</option>'; equipeGlobal = []; return; }
            selectManual.innerHTML = '';
            if (data && data.length > 0) {
                equipeGlobal = data;
                data.forEach(f => selectManual.innerHTML += `<option value="${f.id}">${f.nome} (ID: ${f.matricula})</option>`);
            } else {
                selectManual.innerHTML = '<option value="">Nenhum funcionário ativo</option>';
                equipeGlobal = [];
            }
        }

        async function carregarTerceirizadosPorObra() {
            const selectTerc = document.getElementById('metragem-terceirizado');
            selectTerc.innerHTML = '<option value="">Carregando...</option>';
            const { data, error } = await supabaseClient.from('jsp_terceirizados').select('id, nome').eq('obra_atual_id', obraAtualId).eq('ativo', true).order('nome');
            if (error) { console.error(error); selectTerc.innerHTML = '<option value="">Erro ao carregar</option>'; terceirizadosGlobal = []; return; }
            selectTerc.innerHTML = '';
            if (data && data.length > 0) {
                terceirizadosGlobal = data;
                data.forEach(t => selectTerc.innerHTML += `<option value="${t.id}">${t.nome}</option>`);
            } else {
                selectTerc.innerHTML = '<option value="">Nenhum terceirizado ativo</option>';
                terceirizadosGlobal = [];
            }
        }

        async function carregarPendentes() {
            const container = document.getElementById('lista-pendentes');
            container.innerHTML = '<p class="text-center p-4 text-sm font-bold text-blue-600 animate-pulse">Buscando...</p>';
            const { data, error } = await supabaseClient.from('jsp_ponto_diario').select('*').eq('obra_id', obraAtualId).eq('status', 'PENDENTE').order('hora_registro', { ascending: false });
            if (error) return container.innerHTML = `<p class="text-center text-red-500 font-bold p-4">Erro ao carregar</p>`;
            if (!data || data.length === 0) return container.innerHTML = '<p class="text-center text-slate-400 font-bold p-6 border rounded-xl bg-white">Nenhum registro pendente.</p>';
            container.innerHTML = '';
            data.forEach(p => {
                const func = equipeGlobal.find(e => e.id == p.funcionario_id);
                const nomeDisplay = func ? `${func.nome.split(' ')[0]} (#${func.matricula})` : `Desconhecido`;
                let horaF = "00:00";
                if (p.hora_registro) {
                    if (p.hora_registro.includes('T')) horaF = p.hora_registro.split('T')[1].substring(0, 5);
                    else if (p.hora_registro.includes(' ')) horaF = p.hora_registro.split(' ')[1].substring(0, 5);
                }
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <p class="font-black text-blue-800 text-sm uppercase mb-3 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-blue-500"></i> ${nomeDisplay}</p>
                        <div class="flex gap-2 mb-3">
                            <div class="flex-1"><label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Horário</label><input type="time" id="hora-edit-${p.id}" value="${horaF}" class="w-full p-2 border rounded-lg bg-slate-50 font-black text-center text-slate-700"></div>
                            <div class="flex-[1.5]"><label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Tipo</label><select id="tipo-edit-${p.id}" class="w-full p-2 border rounded-lg bg-slate-50 font-bold text-slate-700"><option value="ENTRADA">Entrada da Obra</option></select></div>
                        </div>
                        <div class="flex gap-2 mt-2 pt-3 border-t border-slate-100">
                            <button onclick="validar(event, '${p.id}', '${p.hora_registro}', '${p.funcionario_id}')" class="flex-1 py-2 bg-emerald-100 hover:bg-emerald-600 text-emerald-800 hover:text-white rounded-lg font-bold flex justify-center items-center gap-2 transition"><i data-lucide="check-circle" class="w-5 h-5"></i> Confirmar</button>
                            <button onclick="recusar('${p.id}')" class="px-4 bg-red-50 hover:bg-red-500 text-red-500 hover:text-white rounded-lg font-bold transition flex justify-center items-center"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        async function abrirModalConfirmados() {
            document.getElementById('modal-confirmados').classList.remove('hidden');
            const container = document.getElementById('modal-confirmados-conteudo');
            container.innerHTML = '<p class="text-center text-slate-500">Carregando...</p>';
            const hoje = new Date().toISOString().split('T')[0];
            const { data, error } = await supabaseClient.from('jsp_ponto_diario').select('*').eq('obra_id', obraAtualId).eq('status', 'VALIDADO').gte('hora_registro', hoje).order('hora_registro', { ascending: true });
            if (error) { container.innerHTML = `<p class="text-center text-red-500">Erro ao carregar</p>`; return; }
            if (!data || data.length === 0) { container.innerHTML = '<p class="text-center text-slate-400 p-4 border rounded-xl bg-white">Nenhum registro confirmado hoje.</p>'; return; }
            const porFunc = {};
            data.forEach(r => { if (!porFunc[r.funcionario_id]) porFunc[r.funcionario_id] = []; porFunc[r.funcionario_id].push(r); });
            container.innerHTML = '';
            for (const funcId in porFunc) {
                const func = equipeGlobal.find(e => e.id == funcId) || { nome: 'Desconhecido', matricula: '?' };
                const pontos = porFunc[funcId];
                const entradas = pontos.filter(p => p.tipo === 'ENTRADA');
                const saidas = pontos.filter(p => p.tipo === 'SAIDA');
                let htmlFunc = `<div class="bg-slate-50 p-3 rounded-lg border border-slate-200 text-sm"><p class="font-bold text-slate-700">${func.nome.split(' ')[0]} (#${func.matricula})</p><div class="text-xs text-slate-500 mt-1 space-y-1">`;
                entradas.forEach(e => { let hora = e.hora_registro.split('T')[1]?.substring(0,5) || e.hora_registro.split(' ')[1]?.substring(0,5) || '--:--'; htmlFunc += `<div>📥 Entrada: ${hora}</div>`; });
                saidas.forEach(s => { let hora = s.hora_registro.split('T')[1]?.substring(0,5) || s.hora_registro.split(' ')[1]?.substring(0,5) || '--:--'; htmlFunc += `<div>📤 Saída: ${hora}</div>`; });
                htmlFunc += `</div></div>`;
                container.innerHTML += htmlFunc;
            }
            lucide.createIcons();
        }

        function fecharModalConfirmados() { document.getElementById('modal-confirmados').classList.add('hidden'); }

        async function validar(event, pontoId, horaOriginal, funcionarioId) {
            const btn = event.currentTarget; const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processando...'; lucide.createIcons();
            try {
                const tipo = document.getElementById(`tipo-edit-${pontoId}`).value;
                const horaEditada = document.getElementById(`hora-edit-${pontoId}`).value;
                let dataApenas = "";
                if (horaOriginal.includes('T')) dataApenas = horaOriginal.split('T')[0];
                else if (horaOriginal.includes(' ')) dataApenas = horaOriginal.split(' ')[0];
                else dataApenas = new Date().toISOString().split('T')[0];
                if (tipo === 'ENTRADA' || tipo === 'AJUSTE_MANUAL') {
                    const duplicado = await verificarDuplicidadePeriodo(funcionarioId, dataApenas, horaEditada);
                    if (duplicado) { alert("❌ Já existe um registro de entrada para este funcionário neste período."); btn.disabled = false; btn.innerHTML = originalText; lucide.createIcons(); return; }
                }
                const horaLocalCravada = `${dataApenas} ${horaEditada}:00`;
                await supabaseClient.from('jsp_ponto_diario').update({ status: 'VALIDADO', tipo: tipo, hora_registro: horaLocalCravada }).eq('id', pontoId);
                if (tipo === 'ENTRADA') {
                    const h = parseInt(horaEditada.split(':')[0]);
                    const horaSaidaAutomatica = h < 12 ? "11:00:00" : "17:00:00";
                    const horaSaidaCravada = `${dataApenas} ${horaSaidaAutomatica}`;
                    await supabaseClient.from('jsp_ponto_diario').insert([{ funcionario_id: funcionarioId, obra_id: obraAtualId, tipo: 'SAIDA', status: 'VALIDADO', hora_registro: horaSaidaCravada, lat_registro: 'SISTEMA_AUTO', lng_registro: 'SISTEMA_AUTO' }]);
                }
                carregarPendentes();
            } catch (error) { alert("Erro ao validar: " + error.message); } 
            finally { btn.disabled = false; btn.innerHTML = originalText; lucide.createIcons(); }
        }

        async function recusar(pontoId) {
            if(confirm("Apagar registro permanentemente?")) {
                await supabaseClient.from('jsp_ponto_diario').delete().eq('id', pontoId);
                carregarPendentes();
            }
        }

        function abrirModalManual() { document.getElementById('modal-manual').classList.remove('hidden'); const hojeLocal = new Date(); document.getElementById('manual-hora').value = `${String(hojeLocal.getHours()).padStart(2,'0')}:${String(hojeLocal.getMinutes()).padStart(2,'0')}`; }
        function fecharModalManual() { document.getElementById('modal-manual').classList.add('hidden'); }

        async function salvarPontoManual(event) {
            const btn = event.currentTarget; const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Salvando...'; lucide.createIcons();
            try {
                const fId = document.getElementById('manual-funcionario').value;
                const hora = document.getElementById('manual-hora').value;
                const tipo = document.getElementById('manual-tipo').value;
                if(!fId || !hora) throw new Error("Preencha todos os campos.");
                const hojeLocal = new Date(); const dataApenas = `${hojeLocal.getFullYear()}-${String(hojeLocal.getMonth()+1).padStart(2,'0')}-${String(hojeLocal.getDate()).padStart(2,'0')}`;
                const duplicado = await verificarDuplicidadePeriodo(fId, dataApenas, hora);
                if (duplicado) { alert("❌ Já existe um registro de entrada para este funcionário neste período."); btn.disabled = false; btn.innerHTML = originalText; lucide.createIcons(); return; }
                const horaLocalCravada = `${dataApenas} ${hora}:00`;
                await supabaseClient.from('jsp_ponto_diario').insert([{ funcionario_id: fId, obra_id: obraAtualId, tipo: tipo, status: 'VALIDADO', hora_registro: horaLocalCravada, lat_registro: 'MANUAL', lng_registro: 'MANUAL' }]);
                if (tipo === 'ENTRADA') {
                    const h = parseInt(hora.split(':')[0]);
                    const horaSaidaAutomatica = h < 12 ? "11:00:00" : "17:00:00";
                    const horaSaidaCravada = `${dataApenas} ${horaSaidaAutomatica}`;
                    await supabaseClient.from('jsp_ponto_diario').insert([{ funcionario_id: fId, obra_id: obraAtualId, tipo: 'SAIDA', status: 'VALIDADO', hora_registro: horaSaidaCravada, lat_registro: 'MANUAL_AUTO', lng_registro: 'MANUAL_AUTO' }]);
                }
                fecharModalManual(); carregarPendentes(); alert("✅ Ponto manual salvo com sucesso!");
            } catch (error) { alert("Erro: " + error.message); } 
            finally { btn.disabled = false; btn.innerHTML = originalText; lucide.createIcons(); }
        }

        function abrirModalMetragem() {
            if (!obraAtualId) { alert("Selecione uma obra primeiro!"); return; }
            document.getElementById('modal-metragem').classList.remove('hidden');
            document.getElementById('metragem-data').value = new Date().toISOString().split('T')[0];
            document.getElementById('metragem-metros').value = '';
            carregarTerceirizadosPorObra();
        }
        function fecharModalMetragem() { document.getElementById('modal-metragem').classList.add('hidden'); }

        async function salvarMetragem(event) {
            const btn = event.currentTarget; const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Salvando...'; lucide.createIcons();
            try {
                const tercId = document.getElementById('metragem-terceirizado').value;
                const data = document.getElementById('metragem-data').value;
                const metros = parseFloat(document.getElementById('metragem-metros').value);
                if (!tercId || !data || isNaN(metros) || metros <= 0) throw new Error("Preencha todos os campos corretamente.");
                const payload = { id: crypto.randomUUID(), terceirizado_id: tercId, obra_id: obraAtualId, data_registro: data, metros: metros, status: 'PENDENTE' };
                const { error } = await supabaseClient.from('jsp_producao_terc').insert([payload]);
                if (error) throw error;
                fecharModalMetragem(); alert("✅ Metragem lançada com sucesso!");
            } catch (error) { alert("Erro: " + error.message); } 
            finally { btn.disabled = false; btn.innerHTML = originalText; lucide.createIcons(); }
        }

        async function gerarTextoRelatorio() {
            if (!equipeGlobal || equipeGlobal.length === 0) await carregarEquipePorObra();
            const hoje = new Date(); const dataHojeBusca = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`; const hojeBr = `${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}/${hoje.getFullYear()}`;
            const { data: registros, error } = await supabaseClient.from('jsp_ponto_diario').select('*').eq('obra_id', obraAtualId).order('hora_registro', { ascending: true });
            if (error) throw error;
            const registrosHoje = registros.filter(p => p.hora_registro && p.hora_registro.startsWith(dataHojeBusca));
            const pontoPorFuncionario = {}; registrosHoje.forEach(p => { if (!pontoPorFuncionario[p.funcionario_id]) pontoPorFuncionario[p.funcionario_id] = []; pontoPorFuncionario[p.funcionario_id].push(p); });
            const funcionariosAtivos = equipeGlobal; const nomeObra = document.getElementById('nome-obra-titulo').innerText;
            let mensagem = `📋 *RELATÓRIO DE PONTO DIÁRIO*\n📍 *Obra:* ${nomeObra}\n📅 *Data:* ${hojeBr}\n\n✅ *PRESENTES:*\n`; const faltantes = []; const preposicoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
            funcionariosAtivos.forEach(func => {
                const pontos = pontoPorFuncionario[func.id] || [];
                if (pontos.length > 0) {
                    let nomeExibicao = func.nome; const partes = func.nome.trim().split(/\s+/);
                    if (partes.length >= 3) { const segundaPalavra = partes[1].toLowerCase(); nomeExibicao = preposicoes.includes(segundaPalavra) ? `${partes[0]} ${partes[1]} ${partes[2]}` : `${partes[0]} ${partes[1]}`; } 
                    else if (partes.length === 2) nomeExibicao = `${partes[0]} ${partes[1]}`;
                    mensagem += `\n👷 *${nomeExibicao}* (ID: ${func.matricula})\n`;
                    pontos.sort((a,b) => new Date(a.hora_registro) - new Date(b.hora_registro));
                    pontos.forEach(p => { if (p.tipo !== 'ENTRADA') return; let horaExata = p.hora_registro.includes('T') ? p.hora_registro.split('T')[1].substring(0,5) : p.hora_registro.split(' ')[1].substring(0,5); mensagem += `   ${p.status === 'VALIDADO' ? '✅' : '⏳'} 📥 ${horaExata} - Entrada\n`; });
                } else { faltantes.push(func); }
            });
            if (faltantes.length) { mensagem += `\n❌ *FALTAS:*\n`; faltantes.forEach(func => { let nomeExibicao = func.nome; const partes = func.nome.trim().split(/\s+/); if (partes.length >= 3) { const segundaPalavra = partes[1].toLowerCase(); nomeExibicao = preposicoes.includes(segundaPalavra) ? `${partes[0]} ${partes[1]} ${partes[2]}` : `${partes[0]} ${partes[1]}`; } else if (partes.length === 2) nomeExibicao = `${partes[0]} ${partes[1]}`; mensagem += `   • ${nomeExibicao} (ID: ${func.matricula})\n`; }); } 
            else { mensagem += `\n🎉 *TODOS OS FUNCIONÁRIOS BATERAM PONTO HOJE!*\n`; }
            mensagem += `\n_Relatório gerado por RV Sistemas_`;
            return mensagem;
        }

        async function compartilharRelatorioWhatsApp() {
            const btn = document.getElementById('btn-whatsapp'); const original = btn.innerHTML; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>'; lucide.createIcons();
            try { const msg = await gerarTextoRelatorio(); window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank'); } 
            catch (e) { alert("Erro: " + e.message); } finally { btn.innerHTML = original; lucide.createIcons(); }
        }

        async function compartilharRelatorioExterno() {
            const btn = document.getElementById('btn-share-externo'); const original = btn.innerHTML; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>'; lucide.createIcons();
            try { const msg = await gerarTextoRelatorio(); 
                if (navigator.share) await navigator.share({ title: 'Relatório de Ponto Diário', text: msg });
                else { await navigator.clipboard.writeText(msg); alert('📋 Relatório copiado! Compartilhe manualmente.'); }
            } catch (e) { if (e.name !== 'AbortError') alert("Erro: " + e.message); } 
            finally { btn.innerHTML = original; lucide.createIcons(); }
        }

        function voltarSelecaoObra() {
            document.getElementById('painel-supervisor').classList.add('hidden');
            document.getElementById('btn-trocar-obra').classList.add('hidden');
            document.getElementById('selecao-obra').classList.remove('hidden');
            localStorage.removeItem('obra_atual_id'); lucide.createIcons();
        }

        async function definirLocalObra() {
            const sel = document.getElementById('select-obra'); if(!sel.value) return alert("Selecione a obra primeiro!");
            const senhaAdmin = prompt("Senha de Administrador:"); if(senhaAdmin !== "rvadmin") return alert("Senha incorreta!");
            if(!confirm(`Definir localização atual como sede da obra?`)) return;
            if (!("geolocation" in navigator)) return alert("GPS não suportado.");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await supabaseClient.from('jsp_obras').update({ lat: pos.coords.latitude.toString(), lng: pos.coords.longitude.toString() }).eq('id', sel.value);
                if(error) alert("Erro ao salvar: " + error.message); else alert("✅ Localização atualizada!");
            }, (err) => alert("Erro no GPS."), { enableHighAccuracy: true });
        }

        async function verificarDuplicidadePeriodo(funcionarioId, dataIso, horaStr) {
            const hora = parseInt(horaStr.split(':')[0]); let horaInicio, horaFim;
            if (hora >= 4 && hora < 12) { horaInicio = "04:00:00"; horaFim = "11:59:59"; } else { horaInicio = "12:00:00"; horaFim = "19:00:00"; }
            const inicio = `${dataIso} ${horaInicio}`; const fim = `${dataIso} ${horaFim}`;
            const { data, error } = await supabaseClient.from('jsp_ponto_diario').select('id').eq('funcionario_id', funcionarioId).eq('obra_id', obraAtualId).in('tipo', ['ENTRADA', 'AJUSTE_MANUAL']).gte('hora_registro', inicio).lte('hora_registro', fim);
            if (error) return true;
            return data && data.length > 0;
        }
    </script>
